version: "3.9"

services:
  postgres:
    image: postgres:15
    container_name: sunliao-postgres
    environment:
      POSTGRES_DB: sunliao
      POSTGRES_USER: sunliao
      POSTGRES_PASSWORD: sunliao_dev
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data

  redis:
    image: redis:7
    container_name: sunliao-redis
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data

volumes:
  postgres_data:
  redis_data:

