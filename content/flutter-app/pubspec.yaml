name: sunliao
description: 瞬 - 24小时限时匿名社交应用
publish_to: 'none'
version: 1.0.3+4

environment:
  sdk: '>=3.0.0 <4.0.0'

dependencies:
  flutter:
    sdk: flutter

  # 状态管理
  provider: ^6.1.1
  
  # 网络请求
  dio: ^5.4.0
  
  # 本地存储
  shared_preferences: ^2.2.2
  hive: ^2.2.3
  hive_flutter: ^1.1.0
  
  # 路由
  go_router: ^13.0.0
  
  # 权限管理
  permission_handler: ^11.2.0
  
  # 图片选择和处理
  image_picker: ^1.0.7
  image: ^4.1.7
  path_provider: ^2.1.2
  
  # 工具
  intl: ^0.18.1
  uuid: ^4.3.3
  
  # UI
  cupertino_icons: ^1.0.2

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^3.0.0

flutter:
  uses-material-design: true
